name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest -q --tb=short

  pipeline-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate fake data
        env:
          PYTHONPATH: src
        run: python -m cosmeticos_ia.data.generate_fake_raw

      - name: Run full pipeline with fake data
        env:
          PYTHONPATH: src
          COSMETICOS_RAW_DATA_DIR: data/raw_fake
        run: python -m cosmeticos_ia.pipelines.run_all_pipelines

      - name: Check required artifacts exist
        run: |
          python - <<'EOF'
          from pathlib import Path
          required = [
            "data/processed/propensity_metrics.csv",
            "data/processed/campanha_top50.csv",
            "data/processed/campaign_uplift_vs_baseline.csv",
            "data/processed/forecast_backtest_summary.csv",
            "data/processed/forecast_model_selection.csv",
            "data/processed/forecast_future_30d.csv",
            "data/processed/monitoring_summary.csv",
          ]
          missing = [f for f in required if not Path(f).exists()]
          if missing:
              print("MISSING artifacts:", missing)
              raise SystemExit(1)
          print(f"All {len(required)} artifacts present.")
          EOF
